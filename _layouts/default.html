<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #2d2a3e;
      --muted: #7c7891;
      --accent: #e0652e;
      --border: #e0dbd3;
      --card-bg: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --fg: #e0dbd3;
        --muted: #9a95a8;
        --accent: #f0915a;
        --border: #2d2a3e;
        --card-bg: #222240;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      padding: 2rem 1rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.6rem; }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }
    nav { text-align: center; margin-bottom: 2rem; }
    nav a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { text-decoration: underline; }
    a { color: var(--accent); }
    h1, h2, h3 { line-height: 1.3; }
    h2 { margin-top: 1.5rem; font-size: 1.2rem; }
    p, ul, ol, blockquote, details { margin-top: 0.8rem; }
    blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--muted);
    }
    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    code {
      background: var(--border);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .post-list { list-style: none; }
    .post-list li {
      padding: 1rem;
      margin-bottom: 0.8rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .post-list .date { color: var(--muted); font-size: 0.85rem; }
    .post-list a { text-decoration: none; font-weight: 600; font-size: 1.05rem; }
    .post-list .summary { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }
    .content { margin-top: 1rem; }
    .content h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .content h2 { font-size: 1.15rem; }
    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
    <footer>
      Powered by <a href="https://github.com/Thysrael/Horizon">Horizon</a> · 繁體中文化由 <a href="https://github.com/wolfgangyu">wolfgangyu</a>
    </footer>
  </div>
</body>
</html>
